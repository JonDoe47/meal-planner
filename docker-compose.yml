version: '3.8'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/app/data/meal.db
      - JWT_SECRET=meal-planner-secret-2024-change-me
      - PORT=3000
      - BIBIGPT_API_KEY=${BIBIGPT_API_KEY}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8181:80"
    depends_on:
      - backend
