services:
  meal-planner:
    build: .
    restart: unless-stopped
    ports:
      - "8181:3000"
    environment:
      - DATABASE_URL=file:/app/data/meal.db
      - JWT_SECRET=meal-planner-secret-2024-change-me
      - PORT=3000
      - BIBIGPT_API_KEY=${BIBIGPT_API_KEY}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
